name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Deploys via Workload Identity Federation (see INFRA.md > CI/CD).
# Requires repo secrets GCP_WIF_PROVIDER and GCP_DEPLOY_SA (already configured).
env:
  PROJECT_ID: language-499814
  REGION: europe-west1
  SERVICE: language

jobs:
  # Runs on every push and PR. Keeps main green and gates the deploy below.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check # typecheck + test + build

  # Applies pending Drizzle migrations to the PROD Neon branch before deploying.
  # Runs only on push to main / manual (not on PRs). The prod DATABASE_URL is read
  # from Secret Manager (single source of truth) — the deploy SA has secretAccessor
  # on it. Dev-branch migrations are applied locally by the developer, not here.
  migrate:
    needs: check # only migrate a green build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for Workload Identity Federation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Migrate prod database
        run: |
          DATABASE_URL="$(gcloud secrets versions access latest \
            --secret=DATABASE_URL --project="$PROJECT_ID")" \
            npm run db:migrate

  deploy:
    needs: migrate # migrate (which needs check) must pass first
    if: github.event_name != 'pull_request' # deploy on push to main / manual only
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for Workload Identity Federation
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      # Source-based deploy: Cloud Build picks up the Dockerfile automatically.
      # App-level auth (Google login) gates everything, so the service is public.
      # Secrets are read from Secret Manager and injected as env vars.
      - name: Deploy
        run: |
          gcloud run deploy "$SERVICE" \
            --project="$PROJECT_ID" \
            --region="$REGION" \
            --source=. \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=2 \
            --set-env-vars="BASE_URL=https://language.levanto.dev" \
            --set-secrets="DATABASE_URL=DATABASE_URL:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,SESSION_SECRET=SESSION_SECRET:latest,ALLOWED_EMAILS=ALLOWED_EMAILS:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest"
