name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

# Deploys via Workload Identity Federation (see INFRA.md > CI/CD).
# Requires repo secrets GCP_WIF_PROVIDER and GCP_DEPLOY_SA (already configured).
env:
  PROJECT_ID: language-499814
  REGION: europe-west1
  SERVICE: language

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for Workload Identity Federation
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          # Workload Identity Federation (no long-lived key). Set these secrets:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      # Source-based deploy: Cloud Build picks up the Dockerfile automatically.
      # App-level auth (Google login) gates everything, so the service is public.
      # Secrets are read from Secret Manager and injected as env vars.
      - name: Deploy
        run: |
          gcloud run deploy "$SERVICE" \
            --project="$PROJECT_ID" \
            --region="$REGION" \
            --source=. \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=2 \
            --set-env-vars="BASE_URL=https://language.levanto.dev" \
            --set-secrets="DATABASE_URL=DATABASE_URL:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,SESSION_SECRET=SESSION_SECRET:latest,ALLOWED_EMAILS=ALLOWED_EMAILS:latest"
